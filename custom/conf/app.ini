APP_NAME = Neural Inverse Base
RUN_MODE = prod
WORK_PATH = /home/niadmin/base

[server]
DOMAIN = base.neuralinverse.com
ROOT_URL = https://base.neuralinverse.com/
HTTP_PORT = 3001
SSH_DOMAIN = ssh.base.neuralinverse.com
SSH_PORT = 22
START_SSH_SERVER = true
DISABLE_SSH = false
LFS_START_SERVER = true
; set via env GITEA__server__LFS_JWT_SECRET
LFS_JWT_SECRET =

[database]
DB_TYPE = postgres
HOST = 127.0.0.1:5432
NAME = gitea
USER = gitea
; set via env GITEA__database__PASSWD
PASSWD =
SSL_MODE = disable

[lfs]
STORAGE_TYPE = azureblob

[storage.azureblob]
AZURE_BLOB_ENDPOINT = https://nibasestorage.blob.core.windows.net/
AZURE_BLOB_ACCOUNT_NAME = nibasestorage
AZURE_BLOB_CONTAINER = ni-base-lfs
; set via env GITEA__storage_azureblob__AZURE_BLOB_ACCOUNT_KEY
AZURE_BLOB_ACCOUNT_KEY =

[repository]
DEFAULT_PRIVATE = true
DEFAULT_PUSH_CREATE_PRIVATE = true
ENABLE_PUSH_CREATE_USER = true

[service]
DISABLE_REGISTRATION = false
REQUIRE_SIGNIN_VIEW = false
REGISTER_EMAIL_CONFIRM = false
ENABLE_NOTIFY_MAIL = false
ALLOW_ONLY_EXTERNAL_REGISTRATION = true
SHOW_REGISTRATION_BUTTON = false
DEFAULT_USER_VISIBILITY = private
DEFAULT_ORG_VISIBILITY = private

[ui]
DEFAULT_THEME = gitea-dark
SHOW_USER_EMAIL = false

[ui.meta]
AUTHOR = Neural Inverse
DESCRIPTION = Neural Inverse Base — secure code storage for your workspaces
KEYWORDS = neural inverse, code, git

[oauth2]
ENABLED = true
; set via env GITEA__oauth2__JWT_SECRET
JWT_SECRET =

[log]
MODE = console
LEVEL = info
ROOT_PATH = /home/niadmin/base/log

[security]
INSTALL_LOCK = true
; set via env GITEA__security__SECRET_KEY
SECRET_KEY =
; set via env GITEA__security__INTERNAL_TOKEN
INTERNAL_TOKEN =

[picture]
DISABLE_GRAVATAR = false
ENABLE_FEDERATED_AVATAR = false

[other]
SHOW_FOOTER_BRANDING = false
SHOW_FOOTER_VERSION = false
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false

[oauth2_client]
ENABLE_AUTO_REGISTRATION = true
ACCOUNT_LINKING = auto

[api]
ENABLE_SWAGGER = true

[mailer]
FROM = noreply@neuralinverse.com

[packages]
ENABLED = true

[actions]
ENABLED = true
