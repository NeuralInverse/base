APP_NAME = Neural Inverse Base
RUN_MODE = prod

[server]
DOMAIN           = base.neuralinverse.com
ROOT_URL         = https://base.neuralinverse.com/
HTTP_PORT        = 3001
SSH_DOMAIN       = base.neuralinverse.com
SSH_PORT         = 22
START_SSH_SERVER = false
DISABLE_SSH      = false
LFS_START_SERVER = true

[database]
DB_TYPE  = postgres
HOST     = 127.0.0.1:5432
NAME     = gitea
USER     = gitea
PASSWD   = ; set via env GITEA__database__PASSWD
SSL_MODE = disable

[repository]
DEFAULT_PRIVATE           = true
DEFAULT_PUSH_CREATE_PRIVATE = true
ENABLE_PUSH_CREATE_USER   = true

[service]
DISABLE_REGISTRATION              = true
REQUIRE_SIGNIN_VIEW               = true
REGISTER_EMAIL_CONFIRM            = false
ENABLE_NOTIFY_MAIL                = false
ALLOW_ONLY_EXTERNAL_REGISTRATION  = true
SHOW_REGISTRATION_BUTTON          = false
DEFAULT_USER_VISIBILITY           = private
DEFAULT_ORG_VISIBILITY            = private

[ui]
DEFAULT_THEME = gitea-dark
SHOW_USER_EMAIL = false

[ui.meta]
AUTHOR      = Neural Inverse
DESCRIPTION = Neural Inverse Base — secure code storage for your workspaces
KEYWORDS    = neural inverse, code, git

[oauth2]
ENABLED = true

[log]
MODE      = console
LEVEL     = warn
ROOT_PATH = /home/niadmin/base/log

[security]
INSTALL_LOCK                  = true
SECRET_KEY                    = ; set via env
INTERNAL_TOKEN                = ; set via env

[picture]
DISABLE_GRAVATAR        = false
ENABLE_FEDERATED_AVATAR = false

[other]
SHOW_FOOTER_BRANDING           = false
SHOW_FOOTER_VERSION            = false
SHOW_FOOTER_TEMPLATE_LOAD_TIME = false
